<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FileShareExpert</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="container">
    <h1>FileShareExpert</h1>
    <p class="muted">Веб-интерфейс файлообменника</p>
    <div id="messageBox" class="message-box hidden" role="alert"></div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab-target="accountTab">Аккаунт</button>
      <button class="tab-btn" data-tab-target="filesTab">Файлы</button>
      <button class="tab-btn" data-tab-target="linksTab">Ссылки</button>
      <button class="tab-btn" data-tab-target="logsTab">Логи</button>
    </div>

    <section id="accountTab" class="card tab-panel active">
      <h2>Пользователь</h2>
      <div class="subtab-bar">
        <button class="subtab-btn active" data-subtab-target="loginSubtab">Вход</button>
        <button class="subtab-btn" data-subtab-target="registerSubtab">Регистрация</button>
      </div>

      <div id="loginSubtab" class="subtab-panel active">
        <div class="grid two">
          <label>
            Логин
            <input id="loginUsername" type="text" placeholder="user1">
          </label>
          <label>
            Пароль
            <input id="loginPassword" type="password" placeholder="password">
          </label>
        </div>
        <div class="actions">
          <button id="loginBtn">Войти</button>
          <button id="logoutBtn" class="secondary">Выйти</button>
        </div>
      </div>

      <div id="registerSubtab" class="subtab-panel">
        <div class="grid two">
          <label>
            Логин
            <input id="registerUsername" type="text" placeholder="new_user">
          </label>
          <label>
            Email
            <input id="registerEmail" type="email" placeholder="user@example.com">
          </label>
          <label>
            Пароль
            <input id="registerPassword" type="password" placeholder="password">
          </label>
        </div>
        <div class="actions">
          <button id="registerBtn">Зарегистрироваться</button>
        </div>
      </div>

      <p id="authInfo" class="muted">Не авторизован</p>

      <hr>
      <h3>Смена пароля</h3>
      <div class="grid two">
        <label>
          Текущий пароль
          <input id="currentPassword" type="password" placeholder="current password">
        </label>
        <label>
          Новый пароль
          <input id="newPassword" type="password" placeholder="new password">
        </label>
      </div>
      <div class="actions">
        <button id="changePasswordBtn">Сменить пароль</button>
      </div>

      <hr>
      <h3>Забыли пароль</h3>
      <div class="grid two">
        <label>
          Email для восстановления
          <input id="recoveryEmail" type="email" placeholder="user@example.com">
        </label>
      </div>
      <div class="actions">
        <button id="forgotPasswordBtn" class="secondary">Отправить код восстановления</button>
      </div>

      <div class="grid two">
        <label>
          Токен из письма
          <input id="resetToken" type="text" placeholder="reset token">
        </label>
        <label>
          Новый пароль
          <input id="resetNewPassword" type="password" placeholder="new password">
        </label>
      </div>
      <div class="actions">
        <button id="resetPasswordBtn">Восстановить пароль</button>
      </div>
    </section>

    <section id="filesTab" class="card tab-panel">
      <h2>Загрузка и управление файлами</h2>
      <div class="actions">
        <input id="uploadFileInput" type="file">
        <button id="uploadBtn">Загрузить</button>
        <button id="refreshFilesBtn" class="secondary">Обновить список</button>
      </div>
      <div id="filesContainer" class="files"></div>
    </section>

    <section id="linksTab" class="card tab-panel">
      <h2>Скачивание по ссылке</h2>
      <p class="muted">Можно скачать файл по share token или полной ссылке.</p>
      <label>
        Token или URL
        <input id="shareInput" type="text" placeholder="token или http://localhost:5071/api/share/token">
      </label>
      <div class="actions">
        <button id="downloadByShareBtn">Скачать по ссылке</button>
      </div>
    </section>

    <section id="logsTab" class="card tab-panel">
      <h2>Логи</h2>
      <pre id="log"></pre>
    </section>
  </main>

  <template id="fileTemplate">
    <article class="file-item file-icon-card">
      <header class="file-card-header">
        <div class="file-icon">📄</div>
        <div class="file-main">
          <strong class="file-name"></strong>
          <span class="file-meta"></span>
        </div>
      </header>

      <div class="mini-actions">
        <button class="mini-btn download-btn" title="Скачать">⬇</button>
        <button class="mini-btn rename-btn" title="Переименовать">✎</button>
        <button class="mini-btn create-share-btn" title="Создать ссылку">🔗</button>
        <button class="mini-btn disable-share-btn" title="Отключить ссылку">🚫</button>
        <button class="mini-btn copy-link-btn" title="Копировать ссылку">📋</button>
        <button class="mini-btn add-whitelist-btn" title="Добавить в whitelist">➕WL</button>
        <button class="mini-btn load-whitelist-btn" title="Показать whitelist">👥WL</button>
        <button class="mini-btn remove-whitelist-btn" title="Удалить из whitelist">➖WL</button>
        <button class="mini-btn danger delete-btn" title="Удалить файл">🗑</button>
      </div>

      <input class="share-url compact-link" type="text" readonly placeholder="Ссылка появится после создания">
    </article>
  </template>

  <script src="/app.js"></script>
</body>
</html>
